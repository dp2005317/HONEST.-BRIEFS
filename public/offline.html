<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HONEST. Briefs</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7f7f5 0%, #ffffff 100%);
        color: #111111;
      }

      main {
        width: min(420px, calc(100vw - 2rem));
        border: 2px solid #111111;
        background: #ffffff;
        padding: 2rem;
        box-shadow: 12px 12px 0 #111111;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
        line-height: 1;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <p style="font-size: 0.75rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6;">
        Offline Edition
      </p>
      <h1>HONEST. Briefs</h1>
      <p>You are offline. Reconnect to refresh the latest headlines.</p>
    </main>
  </body>
</html>
